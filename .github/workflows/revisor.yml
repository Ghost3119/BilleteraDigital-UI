name: Revisor de Código Frontend

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build y validación del proyecto React/Vite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Build del proyecto
        run: npm run build

      - name: Verificar éxito
        run: echo "✅ Build exitoso. No hay errores de TypeScript ni de compilación."
